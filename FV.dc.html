<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070d; }
  a { color: inherit; text-decoration: none; }
</style>
</helmet>
<div style="width:428px; max-width:100%; margin:0 auto; background:#07070d; color:#fff; font-family:'Helvetica Neue',Helvetica,Arial,'Noto Sans JP',sans-serif; overflow:hidden;">

  <!-- Header -->
  <div style="display:flex; align-items:center; justify-content:space-between; padding:28px 16px 0;">
    <span style="font-weight:700; font-size:21px; letter-spacing:1px;">WORXHUB</span>
    <div onClick="{{ toggleMenu }}" style="display:flex; flex-direction:column; gap:6px; width:26px; cursor:pointer;">
      <span style="height:2px; background:#fff; border-radius:2px;"></span>
      <span style="height:2px; background:#fff; border-radius:2px;"></span>
      <span style="height:2px; background:#fff; border-radius:2px;"></span>
    </div>
  </div>

  <!-- Menu overlay -->
  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed; inset:0; z-index:100; background:rgba(7,7,13,0.97); backdrop-filter:blur(6px); display:flex; flex-direction:column; padding:28px 24px;">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <span style="font-weight:700; font-size:21px; letter-spacing:1px;">WORXHUB</span>
        <div onClick="{{ closeMenu }}" style="position:relative; width:26px; height:26px; cursor:pointer;">
          <span style="position:absolute; top:12px; left:0; width:26px; height:2px; background:#fff; border-radius:2px; transform:rotate(45deg);"></span>
          <span style="position:absolute; top:12px; left:0; width:26px; height:2px; background:#fff; border-radius:2px; transform:rotate(-45deg);"></span>
        </div>
      </div>
      <nav style="display:flex; flex-direction:column; margin-top:40px;">
        <sc-for list="{{ menu }}" as="m" hint-placeholder-count="4">
          <a href="{{ m.href }}" onClick="{{ closeMenu }}" style="font-size:22px; font-weight:700; color:#fff; padding:18px 0; border-bottom:1px solid #1c1c26;">{{ m.label }}</a>
        </sc-for>
      </nav>
      <div style="display:flex; flex-direction:column; gap:16px; margin-top:36px;">
        <a href="https://012grp.co.jp/company/corporate_profile" target="_blank" rel="noopener" onClick="{{ closeMenu }}" style="font-size:15px; color:#8a8a94;">会社概要</a>
        <a href="https://012grp.co.jp/policy" target="_blank" rel="noopener" onClick="{{ closeMenu }}" style="font-size:15px; color:#8a8a94;">プライバシーポリシー</a>
      </div>
    </div>
  </sc-if>

  <!-- Hero -->
  <div style="position:relative; padding:0 16px; min-height:508px;">
    <img src="uploads/opt-fvproduct.jpg" alt="M6APro V2" style="position:absolute; top:96px; right:-58px; width:360px; height:auto; z-index:0; pointer-events:none;">

    <div style="position:relative; z-index:1;" data-reveal>
      <div style="font-size:13px; font-weight:600; letter-spacing:3px; color:#7c74ff; margin-top:46px;">READY TO UPGRADE</div>
      <div style="font-size:40px; font-weight:800; line-height:1.02; margin-top:8px;">M6APro V2</div>
      <div style="font-size:15px; font-weight:400; color:#c9c9d4; margin-top:4px;">Interactive Flat Panel</div>
      <div style="width:36px; height:3px; border-radius:2px; margin:16px 0 18px; background:linear-gradient(90deg,#8a63ff,#4f8dff);"></div>

      <div style="font-size:21px; font-weight:700; line-height:1.35;">会議が変わる。</div>
      <div style="font-size:21px; font-weight:700; line-height:1.35;"><span style="color:#8f86ff;">意思決定が</span>速くなる。</div>

      <p style="font-size:14px; line-height:22px; color:#b6b6c2; margin-top:16px; text-wrap:pretty;">
        ホワイトボード・Web会議・<br>プレゼンテーションを一台に統合。<br>すべての会議を、もっとスマートに。
      </p>

      <a href="#" style="display:inline-flex; align-items:center; gap:12px; border:1px solid #3a3a48; border-radius:7px; padding:8px 16px; margin-top:22px;">
        <img src="uploads/chrome--v3.png" alt="Chrome" style="width:24px; height:24px; display:block;">
        <span style="line-height:1.25;">
          <span style="display:block; font-size:14px; font-weight:700;">Google EDLA</span>
          <span style="display:block; font-size:12px; color:#d6d6df;">認証取得</span>
        </span>
      </a>
    </div>
  </div>

  <!-- CTA -->
  <div style="position:relative; z-index:5; margin-top:-64px; padding:0 16px; display:flex; flex-direction:column; gap:12px;" data-reveal>
    <a href="contact.html" style="position:relative; display:flex; align-items:center; height:56px; border-radius:28px; padding:0 20px; background:linear-gradient(90deg,#6c4bd6,#7f7bef);">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6"><rect x="4" y="2.5" width="14" height="19" rx="2.5"/><path d="M11 8v6m0 0l-2.5-2.5M11 14l2.5-2.5"/></svg>
      <span style="flex:1; text-align:center; font-size:16px; font-weight:700;">資料ダウンロード</span>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M4 12h15m0 0l-6-6m6 6l-6 6"/></svg>
    </a>
    <a href="contact.html" style="position:relative; display:flex; align-items:center; height:56px; border-radius:28px; padding:0 20px; border:1px solid #3a3a48;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M4 7l8 6 8-6"/></svg>
      <span style="flex:1; text-align:center; font-size:16px; font-weight:700;">お問い合わせ</span>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M4 12h15m0 0l-6-6m6 6l-6 6"/></svg>
    </a>
  </div>

  <!-- Features -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:26px 20px; padding:44px 16px 40px;" data-reveal data-stagger>
    <sc-for list="{{ features }}" as="f" hint-placeholder-count="8">
      <div style="display:flex; gap:12px;">
        <div style="flex:0 0 auto; color:#8a63ff;">{{ f.icon }}</div>
        <div>
          <div style="font-size:12px; font-weight:700; line-height:1.3;">{{ f.title }}</div>
          <div style="font-size:8.5px; line-height:13px; color:#a9a9b6; margin-top:4px; text-wrap:balance;">{{ f.desc }}</div>
        </div>
      </div>
    </sc-for>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:428,&quot;height&quot;:1560}}">
class Component extends DCLogic {
  state = { menuOpen: false };
  renderVals() {
    const ic = (p) => React.createElement('span', { dangerouslySetInnerHTML: { __html: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${p}</svg>` } });
    const menu = [
      { label:'製品特徴', href:'#features' },
      { label:'AI機能', href:'#ai' },
      { label:'製品情報', href:'#spec' },
      { label:'お問い合わせ', href:'contact.html' },
    ];
    const features = [
      { title:'電子黒板', desc:'直感的な書き込みとリアルタイム共有',
        icon: ic('<rect x="3" y="4" width="18" height="13" rx="1.5"/><path d="M12 17v3M8 20h8"/><path d="M8.5 13l3-3 1.2 1.2M14 8.5l1.5-1.5 1.5 1.5-4.5 4.5H11v-1.5z"/>') },
      { title:'Web会議', desc:'主要なWeb会議ツールにワンタッチで接続',
        icon: ic('<rect x="3" y="6" width="12" height="12" rx="2"/><path d="M15 10l6-3v10l-6-3z"/><path d="M6.5 12h4M8.5 10v4"/>') },
      { title:'ワイヤレス投影', desc:'ケーブルレスで簡単に画面共有',
        icon: ic('<rect x="7" y="3" width="14" height="10" rx="1.5"/><path d="M3 15a6 6 0 016 6M3 19a2 2 0 012 2"/><circle cx="3.5" cy="20.5" r="0.6" fill="currentColor"/>') },
      { title:'高性能カメラ', desc:'AIオートフレーミングで最適な映像を実現',
        icon: ic('<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/>') },
      { title:'高性能マイク・スピーカー', desc:'クリアな音声でスムーズなコミュニケーション',
        icon: ic('<rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0012 0M12 17v4M9 21h6"/>') },
      { title:'Google に対応', desc:'Googleサービスとの高い互換性',
        icon: ic('<path d="M20 12a8 8 0 10-3 6.2"/><path d="M12 12h8v0"/><path d="M20 12v4"/>') },
      { title:'AI機能搭載', desc:'会議をよりスマートに、生産性を最大化',
        icon: ic('<path d="M12 3a6 6 0 016 6c0 2-1 3-1 5a3 3 0 01-3 3H10a3 3 0 01-3-3c0-2-1-3-1-5a6 6 0 016-6z"/><text x="12" y="13" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">AI</text>') },
      { title:'安心のセキュリティ', desc:'企業利用に最適なセキュリティ設計',
        icon: ic('<path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="M9 12l2 2 4-4"/>') },
    ];
    return {
      features, menu,
      menuOpen: this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen: false }),
    };
  }
}
</script>
</body>
</html>
