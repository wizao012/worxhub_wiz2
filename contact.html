<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#07070d"/><text x="50" y="46" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">WORX</text><text x="50" y="62" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#8a63ff" text-anchor="middle">HUB</text></svg>
</template>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070d; }
  a { color: inherit; text-decoration: none; }
  input, textarea { font-family:'Helvetica Neue',Helvetica,Arial,'Noto Sans JP',sans-serif; }
  input::placeholder, textarea::placeholder { color:#55555f; }
  input:focus, textarea:focus { outline:none; border-color:#8a63ff !important; box-shadow:0 0 0 3px rgba(138,99,255,0.18); }
</style>
</helmet>
<div style="width:428px; max-width:100%; margin:0 auto; min-height:100vh; background:#07070d; color:#fff; font-family:'Helvetica Neue',Helvetica,Arial,'Noto Sans JP',sans-serif; overflow:hidden;">

  <!-- Header -->
  <div style="display:flex; align-items:center; justify-content:space-between; padding:28px 16px 0;">
    <a href="index.html" style="font-weight:700; font-size:21px; letter-spacing:1px;">WORXHUB</a>
    <a href="index.html" style="display:inline-flex; align-items:center; gap:6px; font-size:13px; color:#9a9aa6;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7"/></svg>トップへ戻る
    </a>
  </div>

  <!-- Form view -->
  <sc-if value="{{ showForm }}" hint-placeholder-val="{{ true }}">
    <div style="padding:36px 24px 56px;">
      <div style="font-size:13px; font-weight:600; letter-spacing:3px; color:#7c74ff;">CONTACT</div>
      <h1 style="font-size:30px; font-weight:800; line-height:1.25; margin-top:10px;">資料ダウンロード /<br>お問い合わせ</h1>
      <div style="width:36px; height:3px; border-radius:2px; margin:16px 0 8px; background:linear-gradient(90deg,#8a63ff,#4f8dff);"></div>
      <p style="font-size:14px; line-height:22px; color:#b6b6c2; margin-top:14px; text-wrap:pretty;">下記フォームにご入力ください。<br>担当者より折り返しご連絡し、製品資料をお送りいたします。</p>

      <form onSubmit="{{ handleSubmit }}" style="display:flex; flex-direction:column; gap:22px; margin-top:32px;">
        <label style="display:flex; flex-direction:column; gap:8px;">
          <span style="font-size:13px; font-weight:600; color:#d0d0da;">会社名<span style="color:#ff6b6b; margin-left:6px;">必須</span></span>
          <input type="text" required placeholder="株式会社ゼロワンオー" style="height:52px; padding:0 16px; background:#0e0e16; border:1px solid #2a2a36; border-radius:10px; color:#fff; font-size:15px; transition:border-color .2s, box-shadow .2s;">
        </label>
        <label style="display:flex; flex-direction:column; gap:8px;">
          <span style="font-size:13px; font-weight:600; color:#d0d0da;">名前<span style="color:#ff6b6b; margin-left:6px;">必須</span></span>
          <input type="text" required placeholder="山田 太郎" style="height:52px; padding:0 16px; background:#0e0e16; border:1px solid #2a2a36; border-radius:10px; color:#fff; font-size:15px; transition:border-color .2s, box-shadow .2s;">
        </label>
        <label style="display:flex; flex-direction:column; gap:8px;">
          <span style="font-size:13px; font-weight:600; color:#d0d0da;">電話番号<span style="color:#ff6b6b; margin-left:6px;">必須</span></span>
          <input type="tel" required placeholder="090-1234-5678" style="height:52px; padding:0 16px; background:#0e0e16; border:1px solid #2a2a36; border-radius:10px; color:#fff; font-size:15px; transition:border-color .2s, box-shadow .2s;">
        </label>
        <label style="display:flex; flex-direction:column; gap:8px;">
          <span style="font-size:13px; font-weight:600; color:#d0d0da;">メールアドレス<span style="color:#ff6b6b; margin-left:6px;">必須</span></span>
          <input type="email" required placeholder="example@company.co.jp" style="height:52px; padding:0 16px; background:#0e0e16; border:1px solid #2a2a36; border-radius:10px; color:#fff; font-size:15px; transition:border-color .2s, box-shadow .2s;">
        </label>
        <label style="display:flex; flex-direction:column; gap:8px;">
          <span style="font-size:13px; font-weight:600; color:#d0d0da;">導入検討理由<span style="color:#8a8a94; margin-left:6px; font-weight:400;">任意</span></span>
          <textarea rows="4" placeholder="現在の課題や、ご検討の背景などをご記入ください。" style="padding:14px 16px; background:#0e0e16; border:1px solid #2a2a36; border-radius:10px; color:#fff; font-size:15px; line-height:1.6; resize:vertical; transition:border-color .2s, box-shadow .2s;"></textarea>
        </label>

        <button type="submit" style="display:flex; align-items:center; justify-content:center; gap:10px; height:56px; border:none; border-radius:28px; background:linear-gradient(90deg,#6c4bd6,#7f7bef); color:#fff; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px;">
          送信する
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M4 12h15m0 0l-6-6m6 6l-6 6"/></svg>
        </button>
        <p style="font-size:11px; line-height:18px; color:#8a8a94; text-align:center;">送信により、<a href="https://012grp.co.jp/policy" target="_blank" rel="noopener" style="color:#9b86ff; text-decoration:underline;">プライバシーポリシー</a>に同意したものとみなされます。</p>
      </form>
    </div>
  </sc-if>

  <!-- Thank-you view -->
  <sc-if value="{{ showThanks }}" hint-placeholder-val="{{ false }}">
    <div style="padding:72px 24px 64px; text-align:center; display:flex; flex-direction:column; align-items:center;">
      <div style="width:88px; height:88px; border-radius:50%; background:radial-gradient(circle at 50% 40%, rgba(138,99,255,0.35), rgba(138,99,255,0.05)); display:flex; align-items:center; justify-content:center; border:1px solid rgba(138,99,255,0.4);">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#a58bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>
      </div>
      <h1 style="font-size:28px; font-weight:800; margin-top:28px;">ありがとうございました</h1>
      <div style="width:36px; height:3px; border-radius:2px; margin:16px 0 0; background:linear-gradient(90deg,#8a63ff,#4f8dff);"></div>
      <p style="font-size:14px; line-height:24px; color:#b6b6c2; margin-top:22px; text-wrap:pretty;">お問い合わせを受け付けました。<br>担当者より2〜3営業日以内にご連絡いたします。<br>今しばらくお待ちくださいませ。</p>

      <div style="width:100%; margin-top:36px; padding:24px 20px; background:#0d0d14; border:1px solid #1c1c26; border-radius:16px;">
        <div style="font-size:15px; font-weight:700;">製品資料のダウンロード</div>
        <p style="font-size:12.5px; line-height:20px; color:#a9a9b6; margin-top:8px;">WORXHUB M6APro V2 の詳細資料（PDF）を<br>今すぐダウンロードいただけます。</p>
        <a href="{{ pdfUrl }}" target="_blank" rel="noopener" download style="display:flex; align-items:center; justify-content:center; gap:10px; height:52px; border-radius:26px; background:linear-gradient(90deg,#6c4bd6,#7f7bef); color:#fff; font-size:15px; font-weight:700; margin-top:18px;">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7"><path d="M12 4v11m0 0l-4-4m4 4l4-4M5 19h14"/></svg>
          資料をダウンロード
        </a>
      </div>

      <a href="index.html" style="display:inline-flex; align-items:center; gap:8px; margin-top:28px; font-size:14px; color:#9a9aa6;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7"/></svg>トップページへ戻る
      </a>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:428,&quot;height&quot;:980}}">
class Component extends DCLogic {
  state = { submitted: false };
  renderVals() {
    return {
      showForm: !this.state.submitted,
      showThanks: this.state.submitted,
      pdfUrl: 'https://www.dropbox.com/scl/fi/t2qwwm0dkpzrq3hwinm4j/WORXHUB_M6AProV2.pdf?rlkey=vq4puxm8scjhj9tkmy73ru33z&st=i4d50mwh&dl=1',
      handleSubmit: (e) => {
        e.preventDefault();
        this.setState({ submitted: true });
        window.scrollTo(0, 0);
      },
    };
  }
}
</script>
</body>
</html>
