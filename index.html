<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:428,&quot;height&quot;:3400}}">
class Component extends DCLogic {
  componentDidMount() {
    const init = (el) => {
      if (el.dataset.revInit) return;
      el.dataset.revInit = '1';
      const dir = el.getAttribute('data-reveal') || 'up';
      const from = dir === 'left' ? 'translateX(-60px)' : dir === 'right' ? 'translateX(60px)' : 'translateY(48px)';
      const targets = el.hasAttribute('data-stagger') ? [...el.children] : [el];
      targets.forEach((t, i) => {
        t._from = from;
        t.style.opacity = '0';
        t.style.transform = from;
        t.style.transition = 'opacity 1.1s cubic-bezier(.16,.7,.3,1), transform 1.1s cubic-bezier(.16,.7,.3,1)';
        t.style.transitionDelay = (i * 0.13) + 's';
        t.style.willChange = 'opacity, transform';
      });
      el._revTargets = targets;
      this._io.observe(el);
    };
    this._io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        const show = e.isIntersecting;
        (e.target._revTargets || [e.target]).forEach((t) => {
          t.style.opacity = show ? '1' : '0';
          t.style.transform = show ? 'none' : (t._from || 'translateY(48px)');
        });
      });
    }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' });
    const scan = () => document.querySelectorAll('[data-reveal]').forEach(init);
    scan();
    this._mo = new MutationObserver(scan);
    this._mo.observe(document.body, { childList: true, subtree: true });

    // Sticky bottom CTA banner
    const bar = document.getElementById('stickyCta');
    if (bar) {
      const onScroll = () => {
        const y = window.scrollY || document.documentElement.scrollTop;
        const nearBottom = (window.innerHeight + y) >= (document.body.scrollHeight - 340);
        const show = y > 560 && !nearBottom;
        bar.style.transform = show ? 'translateY(0)' : 'translateY(140%)';
        bar.style.opacity = show ? '1' : '0';
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      this._onScroll = onScroll;
      onScroll();
    }
  }
  componentWillUnmount() {
    this._io && this._io.disconnect();
    this._mo && this._mo.disconnect();
    this._onScroll && window.removeEventListener('scroll', this._onScroll);
  }
  renderVals() { return {}; }
}
</script>
