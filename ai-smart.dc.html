<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070d; }
  a { color: inherit; text-decoration: none; }
</style>
</helmet>
<div style="width:428px; max-width:100%; margin:0 auto; background:#07070d; color:#fff; font-family:'Helvetica Neue',Helvetica,Arial,'Noto Sans JP',sans-serif; overflow:hidden;">

  <div style="text-align:center; padding:44px 16px 28px;" data-reveal>
    <div style="font-size:30px; font-weight:800; letter-spacing:-0.5px; white-space:nowrap;">AIによるスマートな会議を実現</div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 8px; align-items:start;" data-reveal data-stagger>
    <sc-for list="{{ cards }}" as="c" hint-placeholder-count="8">
      <div style="background:#0d0d14; border-radius:14px; padding:14px;">
        <div style="font-size:13px; font-weight:700; margin-bottom:12px; white-space:nowrap;">{{ c.title }}</div>
        <img src="{{ c.img }}" alt="{{ c.title }}" style="width:100%; height:auto; border-radius:8px; display:block;">
      </div>
    </sc-for>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:428,&quot;height&quot;:1400}}">
class Component extends DCLogic {
  renderVals() {
    const cards = [
      { title:'AIマインドマップ', img:'uploads/opt-ai1.jpg' },
      { title:'クイック検索', img:'uploads/opt-ai2.jpg' },
      { title:'AI付箋', img:'uploads/opt-ai3.jpg' },
      { title:'AI質問生成', img:'uploads/opt-ai4.jpg' },
      { title:'手書き文字認識', img:'uploads/opt-ai5.jpg' },
      { title:'AIコンテンツ生成', img:'uploads/opt-ai6.jpg' },
      { title:'リアルタイム音声翻訳', img:'uploads/opt-ai7.jpg' },
      { title:'範囲選択でのAI分析/翻訳', img:'uploads/opt-ai8.jpg' },
    ];
    return { cards };
  }
}
</script>
</body>
</html>
