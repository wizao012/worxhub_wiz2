<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070d; }
</style>
</helmet>
<div style="width:428px; max-width:100%; margin:0 auto; background:#07070d; color:#fff; font-family:'Helvetica Neue',Helvetica,Arial,'Noto Sans JP',sans-serif; overflow:hidden; padding:44px 16px 40px;">

  <!-- 製品仕様 -->
  <div style="text-align:center;" data-reveal>
    <div style="font-size:40px; font-weight:800;">製品仕様</div>
    <div style="width:200px; height:2px; margin:12px auto 0; background:linear-gradient(90deg,rgba(138,99,255,0),#8a63ff,rgba(138,99,255,0)); box-shadow:0 0 10px rgba(138,99,255,0.7);"></div>
    <div style="font-size:20px; font-weight:400; color:#d0d0da; margin-top:18px;">M6APro V2</div>
  </div>

  <div style="margin-top:24px; border:1px solid #242430; border-radius:10px; overflow:hidden;" data-reveal="left">
    <sc-for list="{{ specs }}" as="s" hint-placeholder-count="15">
      <div style="display:grid; grid-template-columns:40% 60%; border-top:1px solid #1c1c26;">
        <div style="font-size:13px; font-weight:600; color:#fff; padding:14px 16px; border-right:1px solid #242430; white-space:nowrap;">{{ s.k }}</div>
        <div style="font-size:14px; font-weight:400; color:#e2e2e8; padding:14px 16px;">{{ s.v }}</div>
      </div>
    </sc-for>
  </div>

  <!-- 製品サイズ -->
  <div style="text-align:center; margin-top:44px;" data-reveal>
    <div style="font-size:40px; font-weight:800;">製品サイズ</div>
    <div style="width:200px; height:2px; margin:12px auto 0; background:linear-gradient(90deg,rgba(138,99,255,0),#8a63ff,rgba(138,99,255,0)); box-shadow:0 0 10px rgba(138,99,255,0.7);"></div>
  </div>

  <div style="margin-top:24px; border:1px solid #242430; border-radius:10px; overflow:hidden;" data-reveal="right">
    <div style="display:grid; grid-template-columns:32% 44% 24%; background:#1a1a22; font-size:13px; font-weight:700; text-align:center;">
      <div style="padding:12px 6px; border-right:1px solid #242430;">モデル</div>
      <div style="padding:12px 6px; border-right:1px solid #242430;">本体サイズ（W×D×H）</div>
      <div style="padding:12px 6px;">重量</div>
    </div>
    <sc-for list="{{ sizes }}" as="z" hint-placeholder-count="3">
      <div style="display:grid; grid-template-columns:32% 44% 24%; align-items:center; border-top:1px solid #242430;">
        <div style="padding:8px 6px; border-right:1px solid #242430;"><img src="{{ z.img }}" alt="{{ z.model }}" style="width:100%; height:auto; display:block; border-radius:3px;"></div>
        <div style="padding:8px 6px; font-size:13px; color:#e2e2e8; text-align:center;">{{ z.dim }}</div>
        <div style="padding:8px 6px; font-size:13px; color:#e2e2e8; text-align:center; border-left:1px solid #242430;">{{ z.weight }}</div>
      </div>
    </sc-for>
  </div>

  <div style="margin-top:18px; font-size:11px; line-height:18px; color:#8a8a94;">
    ※製品の仕様・外観は予告なく変更される場合があります。<br>
    ※重量は製品構成により異なる場合があります。
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:428,&quot;height&quot;:2050}}">
class Component extends DCLogic {
  renderVals() {
    const specs = [
      { k:'サイズ展開', v:'65インチ / 75インチ / 86インチ' },
      { k:'OS', v:'Android 14.0' },
      { k:'色域（NTSC）', v:'85% NTSC' },
      { k:'CPU', v:'Cortex-A73 + A53' },
      { k:'コントラスト比', v:'5000:1（ダイナミック）' },
      { k:'スピーカー出力', v:'20W ×2 + 20W' },
      { k:'表示色', v:'約10.7億色（10bit）' },
      { k:'メモリ / ストレージ', v:'16GB / 256GB' },
      { k:'AIカメラ', v:'48MP + 3×8MP' },
      { k:'集音性能', v:'最大12m（180°）' },
      { k:'応答速度', v:'8ms' },
      { k:'通信機能', v:'Wi-Fi 6 / Wi-Fi 5 / Bluetooth 5.3' },
      { k:'耐用時間', v:'約50,000時間' },
      { k:'センサー', v:'赤外線・NFC・照度センサー' },
      { k:'表面硬度', v:'9H' },
    ];
    const sizes = [
      { model:'65インチ', img:'uploads/size65.png', dim:'1512 × 87 × 909 mm', weight:'約39.5kg（±1.5kg）' },
      { model:'75インチ', img:'uploads/size75.png', dim:'1723 × 88 × 1022 mm', weight:'約53.2kg（±1.5kg）' },
      { model:'86インチ', img:'uploads/size86.png', dim:'1968 × 88 × 1160 mm', weight:'約68.1kg（±1.5kg）' },
    ];
    return { specs, sizes };
  }
}
</script>
</body>
</html>
